<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisualVS Graph</title>
    <script src="__ORB_URI__"></script>
    <script src="__DAGRE_URI__"></script>
    <style>
        :root {
            /* Syncing with VS Code Theme Tokens */
            --bg-deep: var(--vscode-sideBar-background, #0b0e14);
            --bg-glass: var(--vscode-sideBar-background, rgba(255, 255, 255, 0.05));
            --accent: var(--vscode-button-background, #4facfe);
            --accent-glow: var(--vscode-focusBorder, #00f2fe);
            --border: var(--vscode-sideBar-border, rgba(255, 255, 255, 0.1));
            --text-main: var(--vscode-sideBar-foreground, #ffffff);
            --text-dim: var(--vscode-descriptionForeground, #888);
            --error: var(--vscode-errorForeground, #ff453a);
        }

        body, html {
            margin: 0;
            padding: 0;
            background: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* --- Global Header / Control Bar --- */
        #header {
            display: flex;
            flex-direction: column; 
            align-items: stretch;
            padding: 12px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            gap: 12px;
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .brand-main {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon { font-size: 1.2rem; }

        h1 {
            font-size: 0.9rem;
            margin: 0;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: linear-gradient(90deg, var(--accent), var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .file-info {
            font-size: 0.75rem;
            color: var(--text-dim);
            padding: 2px 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            border: 1px solid var(--border);
            max-width: 120px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .file-info:hover {
            color: var(--text-main);
            background: rgba(255,255,255,0.1);
            border-color: var(--accent);
        }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        #btn-analyze {
            background: var(--accent);
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            flex-grow: 1;
        }

        #btn-analyze.stop-mode {
            background: #ff453a;
            box-shadow: 0 0 8px rgba(255, 69, 58, 0.4);
        }
        #btn-analyze.stop-mode:hover {
            background: #ff6961;
            box-shadow: 0 0 14px rgba(255, 69, 58, 0.6);
        }

        #btn-clean {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        #btn-clean:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border-color: var(--accent);
        }

        .persistence-mode {
            display: flex;
            gap: 8px;
            font-size: 0.7rem;
            color: var(--text-dim);
            background: rgba(255,255,255,0.03);
            padding: 4px 8px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .radio-label:hover { color: var(--text-main); }
        .radio-label input { display: none; }
        .radio-custom {
            width: 10px; height: 10px;
            border-radius: 50%;
            border: 1px solid var(--text-dim);
            display: inline-block;
            position: relative;
        }
        .radio-label input:checked + .radio-custom {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 6px var(--accent);
        }

        #mg-status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px;
            background: var(--bg-glass);
            backdrop-filter: blur(5px);
            border-top: 1px solid var(--border);
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 28px;
            font-size: 0.65rem;
            color: var(--text-dim);
            z-index: 50;
            transition: height 0.3s ease;
        }
        #mg-status-bar:hover {
            height: auto;
            min-height: 28px;
            padding-bottom: 8px;
            padding-top: 8px;
            flex-wrap: wrap;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
            flex-shrink: 0;
        }
        .status-dot.online { background: #4cd964; box-shadow: 0 0 4px #4cd964; }
        .status-dot.offline { background: #ff3b30; }

        .btn-test-mg {
            margin-left: auto;
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 1px 6px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.6rem;
        }
        .btn-test-mg:hover {
            color: var(--text-main);
            border-color: var(--accent);
        }

        #progress-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(0, 242, 254, 0.1);
            border: 1px solid var(--accent);
            border-radius: 6px;
            font-size: 0.75rem;
            color: var(--accent-glow);
            transition: opacity 0.3s;
        }
        #progress-container.hidden {
            display: none;
            opacity: 0;
        }
        .progress-spinner {
            width: 10px; height: 10px;
            border: 2px solid var(--accent);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- Pipeline Log UI --- */
        #log-view {
            padding: 16px;
            overflow-y: auto;
            height: 100%;
            background: var(--bg-deep);
            color: var(--text-dim);
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .log-entry {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            border-left: 3px solid var(--border);
            animation: fadeIn 0.3s ease;
            line-height: 1.4;
        }
        .log-entry[data-stage="pre"] { border-left-color: #f39c12; }
        .log-entry[data-stage="main"] { border-left-color: var(--accent); }
        .log-entry[data-stage="post"] { border-left-color: #2ecc71; }
        .log-entry[data-stage="error"] { border-left-color: #ff5050; }
        
        .log-time { font-size: 0.7rem; color: rgba(255, 255, 255, 0.3); white-space: nowrap; }
        .log-stage { font-weight: bold; color: var(--text-dim); min-width: 45px; text-transform: uppercase; font-size: 0.7rem; margin-top: 2px; }
        .log-message { color: var(--text-main); word-break: break-word; white-space: pre-wrap; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Viewport & Background --- */
        #main-content {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            overflow: hidden;
            background-color: var(--bg-deep);
            position: relative;
        }

        .tab-bar {
            display: flex;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
        }

        .tab-button {
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.8rem;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab-button:hover {
            color: var(--text-main);
        }

        .tab-button.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            font-weight: 600;
        }

        .view-container {
            position: relative;
            flex-grow: 1;
            display: flex;
            overflow: hidden;
        }

        #viewport-container {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 24px 24px;
            overflow: hidden;
            display: block; /* Toggled via JS */
        }

        #viewport-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 40%, var(--bg-deep) 100%);
            pointer-events: none;
            z-index: 10;
        }

        #viewport {
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 5;
        }

        #text-view {
            position: absolute;
            inset: 0;
            overflow-y: auto;
            padding: 16px;
            display: none; /* Toggled via JS */
            background-color: var(--bg-deep);
        }

        .text-view-section {
            margin-bottom: 24px;
        }

        .text-view-section h3 {
            color: var(--accent);
            font-size: 0.9rem;
            margin-bottom: 8px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 4px;
        }

        .text-view-item {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 8px;
            margin-bottom: 8px;
            font-size: 0.75rem;
        }

        /* --- Cypher Editor --- */
        #cypher-editor-panel {
            border-top: 1px solid var(--border);
            background: var(--bg-surface);
            display: flex;
            flex-direction: column;
            padding: 8px;
        }

        #cypher-input {
            width: 100%;
            height: 60px;
            background: var(--bg-deep);
            border: 1px solid var(--border);
            color: var(--text-main);
            font-family: 'Consolas', monospace;
            font-size: 0.75rem;
            padding: 8px;
            resize: vertical;
            border-radius: 4px;
            margin-bottom: 8px;
            box-sizing: border-box;
        }
        
        #cypher-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .cypher-controls {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .btn-cypher {
            background-color: var(--bg-deep);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-cypher:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-cypher.primary {
            background-color: rgba(79, 172, 254, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-cypher.primary:hover {
            background-color: var(--accent);
            color: white;
        }



        /* --- Details Panel --- */
        #details-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            max-height: 40%;
            background: rgba(11, 14, 20, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            padding: 12px;
            box-sizing: border-box;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 200;
            overflow-y: auto;
        }

        #details-panel.visible {
            transform: translateY(0);
        }

        .details-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .details-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent);
        }

        .btn-close-details {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 1rem;
        }

        .btn-close-details:hover {
            color: white;
        }

        .details-content {
            font-size: 0.75rem;
            color: var(--text-dim);
            line-height: 1.4;
        }
        
        .prop-item {
            margin-bottom: 6px;
        }
        .prop-key {
            color: var(--text-main);
            font-weight: bold;
        }
        .prop-value {
            color: #aaa;
            word-break: break-all;
        }

        /* --- Diagnostic Toast --- */
        #diag-toast {
            position: fixed;
            top: 12px;
            left: 12px;
            right: 12px;
            display: none;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(255, 69, 58, 0.95);
            color: white;
            border-radius: 6px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            z-index: 9999;
            font-size: 0.75rem;
        }
        #diag-toast.visible { display: flex; }
        #diag-toast .btn-settings {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
            margin-left: auto;
        }
        #diag-toast .btn-settings:hover { background: rgba(255,255,255,0.3); }

    </style>
</head>
<body>
    <div id="app-container">
        <header id="header">
            <div class="brand">
                <div class="brand-main">
                    <span class="logo-icon">🔗</span>
                    <h1>VisualVS</h1>
                </div>
                <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 4px;">
                    <div id="file-path-display" style="font-size: 0.65rem; color: var(--text-dim); max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title=""></div>
                    <div class="file-info" id="file-info" onclick="selectFile()" title="Click to manually select a target file">Select</div>
                </div>
            </div>
            <div class="controls-row">
                <div class="persistence-mode">
                    <label class="radio-label" title="Keep in DB">
                        <input type="radio" name="p-mode" value="persistent" checked onchange="updatePMode('persistent')">
                        <span class="radio-custom"></span> Keep
                    </label>
                    <label class="radio-label" title="Delete after display">
                        <input type="radio" name="p-mode" value="volatile" onchange="updatePMode('volatile')">
                        <span class="radio-custom"></span> Del
                    </label>
                </div>
                <button id="btn-analyze" onclick="handleAnalyze()">Analyze</button>
                <button id="btn-clean" onclick="handleClean()">Clean</button>

            </div>
            <div id="progress-container" class="hidden">
                <div class="progress-spinner"></div>
                <span id="progress-text">Processing...</span>
            </div>
        </header>

        <main id="main-content">
            <div class="tab-bar">
                <button class="tab-button active" onclick="switchTab('graph')" id="tab-graph">Graph View</button>
                <button class="tab-button" onclick="switchTab('text')" id="tab-text">Text Data</button>
                <button class="tab-button" onclick="switchTab('log')" id="tab-log">Pipeline Log</button>
            </div>

            <div class="view-container">
                <!-- Graph View -->
                <div id="viewport-container">

                    <div id="viewport"></div>

                    <!-- Details Panel -->
                    <div id="details-panel">
                        <div class="details-header">
                            <span class="details-title" id="details-title">Details</span>
                            <button class="btn-close-details" onclick="closeDetails()">×</button>
                        </div>
                        <div class="details-content" id="details-content">
                            <!-- Dynamic content injected here -->
                        </div>
                    </div>
                </div>

                <!-- Text View -->
                <div id="text-view">
                    <!-- Textual representations of nodes/edges will go here -->
                </div>

                <!-- Pipeline Log View -->
                <div id="log-view" style="display: none;">
                    <div style="text-align: center; color: var(--text-dim); opacity: 0.5; padding: 20px; font-size: 0.8rem;">
                        No analysis logs yet.<br>Click "Analyze" to see pipeline progress.
                    </div>
                </div>
            </div>

            <div id="cypher-editor-panel">
                <textarea id="cypher-input" spellcheck="false" placeholder="Enter Cypher query to fetch graph data..."></textarea>
                <div class="cypher-controls">
                    <button class="btn-cypher" onclick="resetCypher()">Reset Query</button>
                    <button class="btn-cypher primary" id="btn-run-query" onclick="runCypher()">Send</button>
                </div>
            </div>
        </main>
        
        <footer id="mg-status-bar">
            <div class="status-dot" id="mg-dot"></div>
            <span id="mg-status-text">Memgraph: Checking...</span>
            <button class="btn-test-mg" onclick="testMG()">Test Connection</button>
        </footer>
    </div>

    <!-- Diagnostic Toast -->
    <div id="diag-toast">
        <span id="diag-msg" style="word-break: break-all; font-size: 0.7rem;">Error</span>
        <button class="btn-settings" onclick="openSettings()">Fix</button>
        <button onclick="hideDiag()" style="background:none; border:none; color:white; cursor:pointer;">×</button>
    </div>

    <script>
        const vscode = acquireVsCodeApi();
        const container = document.getElementById('viewport');
        const fileInfoEl = document.getElementById('file-info');
        const diagToast = document.getElementById('diag-toast');
        const diagMsg = document.getElementById('diag-msg');
        const btnAnalyze = document.getElementById('btn-analyze');
        const cypherInput = document.getElementById('cypher-input');
        
        // --- Tabs Logic ---
        function switchTab(tab) {
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            document.getElementById('viewport-container').style.display = tab === 'graph' ? 'block' : 'none';
            document.getElementById('text-view').style.display = tab === 'text' ? 'block' : 'none';
            document.getElementById('log-view').style.display = tab === 'log' ? 'flex' : 'none';
            
            // Auto-scroll log to bottom if we switch to it
            if (tab === 'log') {
                const logView = document.getElementById('log-view');
                logView.scrollTop = logView.scrollHeight;
            }
        }

        // --- Cypher Editor Logic ---
        function resetCypher() {
            // Reset to empty — user must run Analyze to get AI-generated query
            cypherInput.value = '';
        }

        function runCypher() {
            const cypher = cypherInput.value.trim();
            if (!cypher) return;
            
            // Re-use progress UI for custom query
            const progressContainer = document.getElementById('progress-container');
            const progressText = document.getElementById('progress-text');
            if (progressContainer && progressText) {
                progressContainer.classList.remove('hidden');
                progressText.innerText = 'Running query...';
            }
            
            vscode.postMessage({ type: 'runCustomQuery', cypher });
        }
        
        // Start empty — AI will populate after analysis
        cypherInput.value = '';

        if (cypherInput) {
            cypherInput.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    runCypher();
                }
            });
        }

        function handleAnalyze() {
            // Switch to Stop mode
            btnAnalyze.classList.add('stop-mode');
            btnAnalyze.innerText = '■ Stop';
            btnAnalyze.onclick = handleStop;
            
            // Clear existing logs
            const logView = document.getElementById('log-view');
            logView.innerHTML = '';
            
            vscode.postMessage({ type: 'visualize' });
        }

        function handleStop() {
            vscode.postMessage({ type: 'abort' });
            // Optimistically reset UI — the extension will confirm with 'aborted'
            resetAnalyzeBtn();
        }

        function resetAnalyzeBtn() {
            btnAnalyze.classList.remove('stop-mode', 'loading');
            btnAnalyze.innerText = 'Analyze';
            btnAnalyze.onclick = handleAnalyze;
            const pc = document.getElementById('progress-container');
            if (pc) pc.classList.add('hidden');
        }

        function handleClean() {
            if (orb) {
                orb.data.setup({ nodes: [], edges: [] });
                orb.view.render();
            }
            const textView = document.getElementById('text-view');
            if (textView) textView.innerHTML = '<div style="color: var(--text-dim); padding: 16px;">No data to display.</div>';
            if (cypherInput) cypherInput.value = '';
            
            appendLogEntry('Graph view cleared manually.', 'pre');
        }

        function openSettings() {
            vscode.postMessage({ type: 'openSettings' });
        }

        function selectFile() {
            vscode.postMessage({ type: 'selectFile' });
        }

        function hideDiag() {
            if (diagToast) diagToast.classList.remove('visible');
        }

        function showDiag(msg) {
            if (!diagToast) return;
            diagMsg.innerText = msg;
            diagToast.classList.add('visible');
        }

        function updatePMode(mode) {
            vscode.postMessage({ type: 'updatePMode', mode });
        }

        function testMG() {
            const dot = document.getElementById('mg-dot');
            const text = document.getElementById('mg-status-text');
            dot.className = 'status-dot';
            text.innerText = 'Memgraph: Testing...';
            vscode.postMessage({ type: 'testMGConnection' });
        }

        function closeDetails() {
            document.getElementById('details-panel').classList.remove('visible');
        }

        function showDetails(type, data) {
            const panel = document.getElementById('details-panel');
            const title = document.getElementById('details-title');
            const content = document.getElementById('details-content');

            title.innerText = `${type}: ${data.label || 'Unknown'}`;
            
            let html = '';
            
            if (data.labels && data.labels.length > 0) {
                html += `<div class="prop-item"><span class="prop-key">Labels:</span> <span class="prop-value">${data.labels.join(', ')}</span></div>`;
            }

            if (data.properties) {
                for (const [key, value] of Object.entries(data.properties)) {
                    html += `<div class="prop-item"><span class="prop-key">${key}:</span> <span class="prop-value">${JSON.stringify(value)}</span></div>`;
                }
            } else {
                html += `<div class="prop-item"><span class="prop-key">ID:</span> <span class="prop-value">${data.id}</span></div>`;
            }

            if (!html) html = '<div style="color: #666; font-style: italic;">No properties found</div>';
            
            content.innerHTML = html;
            panel.classList.add('visible');
        }

        // Initialize Orb
        let orb = null;
        try {
            if (typeof Orb === 'undefined') {
                throw new Error('Orb global not defined — src/webview/lib/orb.js failed to load (check the <script> tag in index.html and that the file shipped with the VSIX).');
            }
            // The local UMD bundle exports the class directly as Orb
            orb = typeof Orb.Orb === 'function' ? new Orb.Orb(container) : new Orb(container);

            orb.view.setSettings({
                physics: { enabled: false }
            });
        } catch (e) {
            const detail = e && e.stack ? e.stack : (e && e.message ? e.message : String(e));
            console.error('Failed to initialize Orb graph engine:', e);
            showDiag('Engine Error: ' + detail);
            appendLogEntry('Graph engine (Orb) failed to initialize: ' + detail, 'error');
        }
        if (typeof dagre === 'undefined') {
            appendLogEntry('dagre not loaded at script start. The webview will use a grid fallback layout. Verify src/webview/lib/dagre.min.js is shipped and the <script src="__DAGRE_URI__"> tag was rewritten by the extension.', 'error');
        }


        function getColor(str) {
            const colors = [
                '#4facfe', '#00f2fe', '#f093fb', '#f5576c', 
                '#43e97b', '#38f9d7', '#fa709a', '#fee140',
                '#667eea', '#764ba2', '#2af598', '#009efd'
            ];
            let hash = 0;
            if (!str) return colors[0];
            const s = String(str);
            for (let i = 0; i < s.length; i++) {
                hash = s.charCodeAt(i) + ((hash << 5) - hash);
            }
            return colors[Math.abs(hash) % colors.length];
        }

        if (orb) {
            try {
                if (typeof orb.data.setDefaultStyle === 'function') {
                    orb.data.setDefaultStyle({
                        getNodeStyle: (node) => {
                            const mainColor = getColor(node.id);
                            return {
                                size: 10,
                                color: '#1a1f2e',
                                label: (node && node.data && node.data.label) || '',
                                labelColor: '#e0e0e0',
                                fontSize: 3.5,
                                borderColor: mainColor,
                                borderWidth: 1.5,
                                shadowColor: mainColor,
                                shadowBlur: 15,
                                selected: { color: mainColor, borderColor: '#ffffff', shadowBlur: 25 },
                                hover:    { color: '#2a3143', shadowBlur: 20 },
                            };
                        },
                        getEdgeStyle: (edge) => {
                            const mainColor = getColor(edge.id || (edge.start + edge.end));
                            return {
                                width: 1,
                                color: hexToRgba(mainColor, 0.4),
                                label: (edge && edge.data && edge.data.label) || '',
                                labelColor: '#a0a0a0',
                                fontSize: 2.5,
                                arrowOffset: 3,
                                selected: { color: mainColor, width: 2 },
                                hover:    { color: mainColor, width: 1.5 },
                            };
                        },
                    });
                } else {
                    appendLogEntry('orb.data.setDefaultStyle is not a function — running with Orb defaults. Verify the Orb version in src/webview/lib/orb.js.', 'error');
                }
            } catch (styleErr) {
                const detail = styleErr && styleErr.stack ? styleErr.stack : String(styleErr);
                console.error('Orb style setup failed:', styleErr);
                appendLogEntry('Failed to apply Orb styles: ' + detail, 'error');
            }

            function hexToRgba(hex, alpha) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            }

            let hasRecentered = false;
            let initialNodeSetup = false;

            // Auto-resize graph when panel dimensions change
            const resizeObserver = new ResizeObserver((entries) => {
                if (orb) {
                    const rect = entries[0].contentRect;
                    if (rect.width > 0 && rect.height > 0) {
                        // Safe to render!
                        
                        // Setup initial node if not done yet
                        if (!initialNodeSetup) {
                            initialNodeSetup = true;
                            try {
                                // Orb expects FLAT { id, label } at the input level.
                                // Inside style getters, Orb wraps it under `.data`.
                                orb.data.setup({
                                    nodes: [{ id: 'test_node_001', label: 'Initial Node', x: 0, y: 0 }],
                                    edges: []
                                });
                                appendLogEntry('Placeholder node "Initial Node" rendered locally (Memgraph welcome node will replace this when available).', 'pre');
                            } catch (e) {
                                console.error('Failed to setup initial node:', e);
                                appendLogEntry('Failed to setup initial placeholder node: ' + (e && e.stack ? e.stack : String(e)), 'error');
                            }
                        }

                        orb.view.render();
                        
                        if (!hasRecentered) {
                            hasRecentered = true;
                            setTimeout(() => {
                                if (container.offsetWidth > 0) orb.view.recenter();
                            }, 50);
                        }
                    }
                }
            });
            resizeObserver.observe(container);

            if (orb && orb.events) {
                orb.events.on('node-click', (event) => {
                    const node = event.node || event.subject;
                    if (node) {
                        showDetails('Node', node.data || node);
                        if (container.offsetWidth > 0) orb.view.render();
                    }
                });
                orb.events.on('edge-click', (event) => {
                    const edge = event.edge || event.subject;
                    if (edge) {
                        showDetails('Edge', edge.data || edge);
                        if (container.offsetWidth > 0) orb.view.render();
                    }
                });
                orb.events.on('bg-click', () => {
                    closeDetails();
                });
            }
        }

        window.addEventListener('message', event => {
            const { type, data, configError, currentFile, fullPath, pMode, message, stage } = event.data;
            
            if (configError) {
                diagMsg.innerText = configError;
                diagToast.classList.add('visible');
                resetAnalyzeBtn();
                appendLogEntry(configError, 'error');
                return;
            }

            if (type === 'syncState' || type === 'updateContext') {
                const pathDisplay = document.getElementById('file-path-display');
                if (fullPath || currentFile) {
                    if (pathDisplay) {
                        pathDisplay.innerText = fullPath || '';
                        pathDisplay.title = fullPath || '';
                    }
                    fileInfoEl.innerText = 'Selected';
                    fileInfoEl.classList.add('has-file');
                } else {
                    if (pathDisplay) {
                        pathDisplay.innerText = '';
                        pathDisplay.title = '';
                    }
                    fileInfoEl.innerText = 'Select';
                    fileInfoEl.classList.remove('has-file');
                }
                
                if (event.data.pMode) {
                    const radio = document.querySelector(`input[name="p-mode"][value="${event.data.pMode}"]`);
                    if (radio) radio.checked = true;
                }
            }

            if (type === 'mgStatus') {
                const dot = document.getElementById('mg-dot');
                const text = document.getElementById('mg-status-text');
                if (event.data.connected) {
                    dot.className = 'status-dot online';
                    text.innerText = `Memgraph: Online (${event.data.nodeCount} nodes)`;
                    text.title = 'Connection successful';
                } else {
                    dot.className = 'status-dot offline';
                    const errMsg = event.data.error ? `: ${event.data.error}` : '';
                    text.innerText = `Memgraph: Offline${errMsg}`;
                    text.title = event.data.error || 'Connection failed';
                }
            }

            if (type === 'aborted') {
                resetAnalyzeBtn();
            }

            if (type === 'progress') {
                const progressContainer = document.getElementById('progress-container');
                const progressText = document.getElementById('progress-text');
                if (progressContainer && progressText) {
                    if (stage === 'done') {
                        resetAnalyzeBtn();
                    } else {
                        progressContainer.classList.remove('hidden');
                        progressText.innerText = message;
                    }
                }
                appendLogEntry(message, stage);
            }

            if (type === 'setData' && data && data.nodes) {
                // Always release the analyze button on terminal data — covers paths
                // where the pipeline reports 'done' before setData but also where
                // it doesn't (e.g. custom query, test connection injecting data).
                resetAnalyzeBtn();

                // Watermark logic removed

                hideDiag();
                closeDetails();

                const pathDisplay = document.getElementById('file-path-display');
                if (fullPath || currentFile) {
                    if (pathDisplay) {
                        pathDisplay.innerText = fullPath || '';
                        pathDisplay.title = fullPath || '';
                    }
                    fileInfoEl.innerText = 'Selected';
                    fileInfoEl.classList.add('has-file');
                } else {
                    if (pathDisplay) {
                        pathDisplay.innerText = '';
                        pathDisplay.title = '';
                    }
                    fileInfoEl.innerText = 'Select';
                    fileInfoEl.classList.remove('has-file');
                }

                try {
                    if (typeof dagre === 'undefined') {
                        appendLogEntry('dagre layout library not loaded — falling back to grid layout. Welcome node will still render but graphs may overlap.', 'error');
                    }
                    const positionedNodes = layoutNodes(data.nodes, data.edges);

                    if (orb) {
                        orb.data.setup({ nodes: positionedNodes, edges: data.edges });
                        renderAndCenter();
                        if (data.nodes.length > 0) {
                            appendLogEntry('Rendered ' + data.nodes.length + ' node(s), ' + data.edges.length + ' edge(s) into Graph View.', 'post');
                        } else {
                            appendLogEntry('Graph View intentionally cleared: 0 nodes returned for this scope. Possible causes: scope filter mismatch, AI cache stale, Memgraph wiped.', 'post');
                        }
                    } else {
                        const why = 'Graph engine (Orb) failed to initialize. Check that src/webview/lib/orb.js loaded and acquireVsCodeApi() succeeded. See devtools console for the underlying error.';
                        showDiag(why);
                        appendLogEntry(why, 'error');
                    }
                } catch (renderErr) {
                    const detail = renderErr && renderErr.stack ? renderErr.stack : (renderErr && renderErr.message ? renderErr.message : String(renderErr));
                    console.error('VisualVS render error:', renderErr);
                    showDiag('Render error: ' + detail);
                    appendLogEntry('Render error while drawing graph: ' + detail, 'error');
                }

                renderTextData(data);

                if (event.data.fetchCypher) {
                    cypherInput.value = event.data.fetchCypher;
                }
            }

            if (type === 'error') {
                resetAnalyzeBtn();
            }

            if (type === 'updateContext' && currentFile) {
                // fileInfoEl.innerText = currentFile; // handled by 'syncState' logic above
            }
        });

        function escapeHtml(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // Append one entry to the Pipeline Log. Used by both 'progress' and
        // 'error' message paths so the user can always see why something
        // happened (e.g. why the welcome node didn't render).
        function appendLogEntry(message, stage) {
            const logView = document.getElementById('log-view');
            if (!logView) return;
            // Drop the placeholder text the first time we append something real
            if (logView.dataset && !logView.dataset.cleared) {
                logView.innerHTML = '';
                logView.dataset.cleared = '1';
            }
            const safeStage = stage || 'pre';
            if (safeStage === 'done') {
                const entry = document.createElement('div');
                entry.style.textAlign = 'center';
                entry.style.color = 'var(--text-dim)';
                entry.style.opacity = '0.5';
                entry.style.margin = '10px 0';
                entry.innerText = '— Analysis Complete —';
                logView.appendChild(entry);
                logView.scrollTop = logView.scrollHeight;
                return;
            }
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' +
                          now.getMinutes().toString().padStart(2, '0') + ':' +
                          now.getSeconds().toString().padStart(2, '0');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.setAttribute('data-stage', safeStage);
            entry.innerHTML =
                '<span class="log-time">' + timeStr + '</span>' +
                '<span class="log-stage">[' + escapeHtml(safeStage) + ']</span>' +
                '<span class="log-message">' + escapeHtml(message) + '</span>';
            logView.appendChild(entry);
            logView.scrollTop = logView.scrollHeight;
        }

        // Render + center, retrying until the orb container has measurable size
        // so welcome data that arrives before layout completes still gets shown.
        function renderAndCenter(attempt = 0) {
            if (!orb) return;
            if (container.offsetWidth > 0 && container.offsetHeight > 0) {
                orb.view.render(() => {
                    orb.view.recenter();
                });
            } else if (attempt < 20) {
                setTimeout(() => renderAndCenter(attempt + 1), 50);
            }
        }

        function layoutNodes(nodes, edges) {
            // Prefer dagre for hierarchical layout; fall back to a simple grid
            // when dagre failed to load so the graph still renders.
            if (typeof dagre !== 'undefined' && dagre.graphlib) {
                try {
                    const g = new dagre.graphlib.Graph();
                    g.setGraph({ rankdir: 'TB', nodesep: 40, ranksep: 60 });
                    g.setDefaultEdgeLabel(() => ({}));
                    nodes.forEach(node => g.setNode(node.id, { width: 40, height: 20 }));
                    edges.forEach(edge => {
                        // Only add edges whose endpoints both exist in the node set,
                        // otherwise dagre will silently create phantom nodes.
                        if (g.hasNode(edge.start) && g.hasNode(edge.end)) {
                            g.setEdge(edge.start, edge.end);
                        }
                    });
                    dagre.layout(g);
                    return nodes.map(node => {
                        const pos = g.node(node.id);
                        return { ...node, x: pos ? pos.x : 0, y: pos ? pos.y : 0 };
                    });
                } catch (e) {
                    console.warn('dagre layout failed, falling back to grid:', e);
                }
            } else {
                console.warn('dagre is not loaded; using grid fallback layout.');
            }
            const cols = Math.max(1, Math.ceil(Math.sqrt(nodes.length)));
            const spacing = 60;
            return nodes.map((node, i) => ({
                ...node,
                x: (i % cols) * spacing,
                y: Math.floor(i / cols) * spacing
            }));
        }

        function renderTextData(data) {
            const textView = document.getElementById('text-view');
            textView.innerHTML = '';
            
            if (!data || (!data.nodes.length && !data.edges.length)) {
                textView.innerHTML = '<div style="color: var(--text-dim); padding: 16px;">No data to display.</div>';
                return;
            }

            // Render Nodes
            if (data.nodes.length > 0) {
                const nodesHeader = document.createElement('h3');
                nodesHeader.innerText = `Nodes (${data.nodes.length})`;
                
                const nodesSection = document.createElement('div');
                nodesSection.className = 'text-view-section';
                nodesSection.appendChild(nodesHeader);
                
                data.nodes.forEach(n => {
                    const el = document.createElement('div');
                    el.className = 'text-view-item';
                    const color = getColor(n.id);
                    el.style.borderLeft = `4px solid ${color}`;
                    
                    const props = Object.entries(n.properties || {})
                        .map(([k, v]) => `<span style="color:#aaa">${k}:</span> <span style="color:#e5c07b">${JSON.stringify(v)}</span>`)
                        .join('<br>');
                    el.innerHTML = `<strong style="color:${color}">${n.label}</strong> <span style="color:var(--text-dim)">(ID: ${n.id})</span><br>${props}`;
                    nodesSection.appendChild(el);
                });
                textView.appendChild(nodesSection);
            }

            // Render Edges
            if (data.edges.length > 0) {
                const edgesHeader = document.createElement('h3');
                edgesHeader.innerText = `Edges (${data.edges.length})`;
                
                const edgesSection = document.createElement('div');
                edgesSection.className = 'text-view-section';
                edgesSection.appendChild(edgesHeader);
                
                data.edges.forEach(e => {
                    const el = document.createElement('div');
                    el.className = 'text-view-item';
                    const color = getColor(e.id || (e.start + e.end));
                    el.style.borderLeft = `4px solid ${color}`;
                    
                    const props = Object.entries(e.properties || {})
                        .map(([k, v]) => `<span style="color:#aaa">${k}:</span> <span style="color:#e5c07b">${JSON.stringify(v)}</span>`)
                        .join('<br>');
                    el.innerHTML = `<strong style="color:${color}">${e.label}</strong> <span style="color:var(--text-dim)">(${e.start} → ${e.end})</span><br>${props}`;
                    edgesSection.appendChild(el);
                });
                textView.appendChild(edgesSection);
            }
        }

        // Add Graph-to-Code callback
        if (orb && orb.events) {
            orb.events.on('node-double-click', (event) => {
                const node = event.node || event.subject;
                if (node) {
                    vscode.postMessage({ type: 'openNode', data: node.data || node });
                }
            });
        }

        // Initialize state sync
        vscode.postMessage({ type: 'ready' });
    </script>
</body>
</html>
