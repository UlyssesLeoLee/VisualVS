<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisualVS Graph</title>
    <script src="https://unpkg.com/@memgraph/orb/dist/orb.bundle.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js"></script>
    <style>
        :root {
            /* Syncing with VS Code Theme Tokens */
            --bg-deep: var(--vscode-sideBar-background, #0b0e14);
            --bg-glass: var(--vscode-sideBar-background, rgba(255, 255, 255, 0.05));
            --accent: var(--vscode-button-background, #4facfe);
            --accent-glow: var(--vscode-focusBorder, #00f2fe);
            --border: var(--vscode-sideBar-border, rgba(255, 255, 255, 0.1));
            --text-main: var(--vscode-sideBar-foreground, #ffffff);
            --text-dim: var(--vscode-descriptionForeground, #888);
            --error: var(--vscode-errorForeground, #ff453a);
        }

        body, html {
            margin: 0;
            padding: 0;
            background: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* --- Global Header / Control Bar --- */
        #header {
            display: flex;
            flex-direction: column; 
            align-items: stretch;
            padding: 12px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            gap: 12px;
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .brand-main {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon { font-size: 1.2rem; }

        h1 {
            font-size: 0.9rem;
            margin: 0;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: linear-gradient(90deg, var(--accent), var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .file-info {
            font-size: 0.75rem;
            color: var(--text-dim);
            padding: 2px 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            border: 1px solid var(--border);
            max-width: 120px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .file-info:hover {
            color: var(--text-main);
            background: rgba(255,255,255,0.1);
            border-color: var(--accent);
        }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        #btn-analyze {
            background: var(--accent);
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            flex-grow: 1;
        }

        .persistence-mode {
            display: flex;
            gap: 8px;
            font-size: 0.7rem;
            color: var(--text-dim);
            background: rgba(255,255,255,0.03);
            padding: 4px 8px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .radio-label:hover { color: var(--text-main); }
        .radio-label input { display: none; }
        .radio-custom {
            width: 10px; height: 10px;
            border-radius: 50%;
            border: 1px solid var(--text-dim);
            display: inline-block;
            position: relative;
        }
        .radio-label input:checked + .radio-custom {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 6px var(--accent);
        }

        #mg-status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px;
            background: var(--bg-glass);
            backdrop-filter: blur(5px);
            border-top: 1px solid var(--border);
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 28px;
            font-size: 0.65rem;
            color: var(--text-dim);
            z-index: 50;
            transition: height 0.3s ease;
        }
        #mg-status-bar:hover {
            height: auto;
            min-height: 28px;
            padding-bottom: 8px;
            padding-top: 8px;
            flex-wrap: wrap;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
            flex-shrink: 0;
        }
        .status-dot.online { background: #4cd964; box-shadow: 0 0 4px #4cd964; }
        .status-dot.offline { background: #ff3b30; }

        .btn-test-mg {
            margin-left: auto;
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 1px 6px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.6rem;
        }
        .btn-test-mg:hover {
            color: var(--text-main);
            border-color: var(--accent);
        }

        #progress-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(0, 242, 254, 0.1);
            border: 1px solid var(--accent);
            border-radius: 6px;
            font-size: 0.75rem;
            color: var(--accent-glow);
            transition: opacity 0.3s;
        }
        #progress-container.hidden {
            display: none;
            opacity: 0;
        }
        .progress-spinner {
            width: 10px; height: 10px;
            border: 2px solid var(--accent);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- Details Panel --- */
        #details-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            max-height: 40%;
            background: rgba(11, 14, 20, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            padding: 12px;
            box-sizing: border-box;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 200;
            overflow-y: auto;
        }

        #details-panel.visible {
            transform: translateY(0);
        }

        .details-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .details-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent);
        }

        .btn-close-details {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 1rem;
        }

        .btn-close-details:hover {
            color: white;
        }

        .details-content {
            font-size: 0.75rem;
            color: var(--text-dim);
            line-height: 1.4;
        }
        
        .prop-item {
            margin-bottom: 6px;
        }
        .prop-key {
            color: var(--text-main);
            font-weight: bold;
        }
        .prop-value {
            color: #aaa;
            word-break: break-all;
        }

    </style>
</head>
<body>
    <div id="app-container">
        <header id="header">
            <div class="brand">
                <div class="brand-main">
                    <span class="logo-icon">🔗</span>
                    <h1>VisualVS</h1>
                </div>
                <div class="file-info" id="file-info" onclick="selectFile()" title="Click to manually select a target file">No File</div>
            </div>
            <div class="controls-row">
                <div class="persistence-mode">
                    <label class="radio-label" title="Keep in DB">
                        <input type="radio" name="p-mode" value="persistent" checked onchange="updatePMode('persistent')">
                        <span class="radio-custom"></span> Keep
                    </label>
                    <label class="radio-label" title="Delete after display">
                        <input type="radio" name="p-mode" value="volatile" onchange="updatePMode('volatile')">
                        <span class="radio-custom"></span> Del
                    </label>
                </div>
                <button id="btn-analyze" onclick="handleAnalyze()">Analyze</button>
            </div>
            <div id="progress-container" class="hidden">
                <div class="progress-spinner"></div>
                <span id="progress-text">Processing...</span>
            </div>
        </header>

        <main id="viewport-container">
            <div id="watermark">
                <span class="icon" style="font-size: 2rem; opacity: 0.2; display: block; margin-bottom: 8px;">🕸️</span>
                <div class="text" id="watermark-text" style="font-size: 0.8rem; color: var(--text-dim); opacity: 0.5;">Open file & Analyze</div>
            </div>
            <div id="viewport"></div>

            <!-- Details Panel -->
            <div id="details-panel">
                <div class="details-header">
                    <span class="details-title" id="details-title">Details</span>
                    <button class="btn-close-details" onclick="closeDetails()">×</button>
                </div>
                <div class="details-content" id="details-content">
                    <!-- Dynamic content injected here -->
                </div>
            </div>
        </main>
        
        <footer id="mg-status-bar">
            <div class="status-dot" id="mg-dot"></div>
            <span id="mg-status-text">Memgraph: Checking...</span>
            <button class="btn-test-mg" onclick="testMG()">Test Connection</button>
        </footer>
    </div>

    <!-- Diagnostic Toast -->
    <div id="diag-toast">
        <span id="diag-msg" style="word-break: break-all; font-size: 0.7rem;">Error</span>
        <button class="btn-settings" onclick="openSettings()">Fix</button>
        <button onclick="hideDiag()" style="background:none; border:none; color:white; cursor:pointer;">×</button>
    </div>

    <script>
        const vscode = acquireVsCodeApi();
        const container = document.getElementById('viewport');
        const fileInfoEl = document.getElementById('file-info');
        const watermarkEl = document.getElementById('watermark');
        const diagToast = document.getElementById('diag-toast');
        const diagMsg = document.getElementById('diag-msg');
        const btnAnalyze = document.getElementById('btn-analyze');
        
        function handleAnalyze() {
            btnAnalyze.classList.add('loading');
            btnAnalyze.innerText = "⏳...";
            vscode.postMessage({ type: 'visualize' });
        }

        function openSettings() {
            vscode.postMessage({ type: 'openSettings' });
        }

        function selectFile() {
            vscode.postMessage({ type: 'selectFile' });
        }

        function hideDiag() {
            if (diagToast) diagToast.classList.remove('visible');
        }

        function updatePMode(mode) {
            vscode.postMessage({ type: 'updatePMode', mode });
        }

        function testMG() {
            const dot = document.getElementById('mg-dot');
            const text = document.getElementById('mg-status-text');
            dot.className = 'status-dot';
            text.innerText = 'Memgraph: Testing...';
            vscode.postMessage({ type: 'testMGConnection' });
        }

        function closeDetails() {
            document.getElementById('details-panel').classList.remove('visible');
        }

        function showDetails(type, data) {
            const panel = document.getElementById('details-panel');
            const title = document.getElementById('details-title');
            const content = document.getElementById('details-content');

            title.innerText = `${type}: ${data.label || 'Unknown'}`;
            
            let html = '';
            
            if (data.labels && data.labels.length > 0) {
                html += `<div class="prop-item"><span class="prop-key">Labels:</span> <span class="prop-value">${data.labels.join(', ')}</span></div>`;
            }

            if (data.properties) {
                for (const [key, value] of Object.entries(data.properties)) {
                    html += `<div class="prop-item"><span class="prop-key">${key}:</span> <span class="prop-value">${JSON.stringify(value)}</span></div>`;
                }
            } else {
                html += `<div class="prop-item"><span class="prop-key">ID:</span> <span class="prop-value">${data.id}</span></div>`;
            }

            if (!html) html = '<div style="color: #666; font-style: italic;">No properties found</div>';
            
            content.innerHTML = html;
            panel.classList.add('visible');
        }

        // Initialize Orb
        const orb = new Orb.Orb(container);

        orb.view.setSettings({
            physics: { enabled: false }
        });

        orb.data.setupStyles({
            getNodeStyle: (node) => ({
                size: 8,
                color: '#4facfe',
                label: node.data.label,
                labelColor: '#ffffff',
                fontSize: 4,
                borderColor: '#00f2fe',
                borderWidth: 1,
                shadowColor: '#00f2fe',
                shadowBlur: 10
            }),
            getEdgeStyle: (edge) => ({
                width: 0.5,
                color: 'rgba(255, 255, 255, 0.2)',
                label: edge.data.label,
                labelColor: '#888',
                fontSize: 2.5,
                arrowOffset: 2
            })
        });

        if (orb.events) {
            orb.events.on('node-click', (event) => {
                const node = event.node || event.subject;
                if (node) {
                    showDetails('Node', node.data || node);
                    orb.view.render();
                }
            });
            orb.events.on('edge-click', (event) => {
                const edge = event.edge || event.subject;
                if (edge) {
                    showDetails('Edge', edge.data || edge);
                    orb.view.render();
                }
            });
            orb.events.on('bg-click', () => {
                closeDetails();
            });
        }

        window.addEventListener('message', event => {
            const { type, data, configError, currentFile, pMode, message, stage } = event.data;
            
            if (configError) {
                diagMsg.innerText = configError;
                diagToast.classList.add('visible');
                
                // Cleanup loading state on error
                btnAnalyze.classList.remove('loading');
                btnAnalyze.innerText = "Analyze";
                const pc = document.getElementById('progress-container');
                if (pc) pc.classList.add('hidden');

                return;
            }

            if (type === 'syncState' || type === 'updateContext') {
                if (currentFile) {
                    fileInfoEl.innerText = currentFile;
                    fileInfoEl.classList.add('has-file');
                }
                if (event.data.pMode) {
                    const radio = document.querySelector(`input[name="p-mode"][value="${event.data.pMode}"]`);
                    if (radio) radio.checked = true;
                }
            }

            if (type === 'mgStatus') {
                const dot = document.getElementById('mg-dot');
                const text = document.getElementById('mg-status-text');
                if (event.data.connected) {
                    dot.className = 'status-dot online';
                    text.innerText = `Memgraph: Online (${event.data.nodeCount} nodes)`;
                    text.title = 'Connection successful';
                } else {
                    dot.className = 'status-dot offline';
                    const errMsg = event.data.error ? `: ${event.data.error}` : '';
                    text.innerText = `Memgraph: Offline${errMsg}`;
                    text.title = event.data.error || 'Connection failed';
                }
            }

            if (type === 'progress') {
                const progressContainer = document.getElementById('progress-container');
                const progressText = document.getElementById('progress-text');
                if (progressContainer && progressText) {
                    if (stage === 'done') {
                        progressContainer.classList.add('hidden');
                        btnAnalyze.classList.remove('loading');
                        btnAnalyze.innerText = "Analyze";
                    } else {
                        progressContainer.classList.remove('hidden');
                        progressText.innerText = message;
                    }
                }
            }

            if (type === 'setData' && data && data.nodes && data.nodes.length > 0) {
                watermarkEl.classList.add('hidden');
                hideDiag();
                closeDetails(); 

                if (currentFile) {
                    fileInfoEl.innerText = currentFile;
                }

                const g = new dagre.graphlib.Graph();
                g.setGraph({ rankdir: 'TB', nodesep: 40, ranksep: 60 });
                g.setDefaultEdgeLabel(() => ({}));

                data.nodes.forEach(node => g.setNode(node.id, { width: 40, height: 20 }));
                data.edges.forEach(edge => g.setEdge(edge.start, edge.end));

                dagre.layout(g);

                const positionedNodes = data.nodes.map(node => {
                    const pos = g.node(node.id);
                    return { ...node, x: pos.x, y: pos.y };
                });

                orb.data.setup({ nodes: positionedNodes, edges: data.edges });
                
                // Smooth transition and zoom to fit
                orb.view.render(() => {
                    orb.view.recenter(300); // 300ms animation
                });
            }

            if (type === 'updateContext' && currentFile) {
                fileInfoEl.innerText = currentFile;
            }
        });

        // Add Graph-to-Code callback
        if (orb.events) {
            orb.events.on('node-double-click', (event) => {
                const node = event.node || event.subject;
                if (node) {
                    vscode.postMessage({ type: 'openNode', data: node.data || node });
                }
            });
        }

        // Initialize state sync
        vscode.postMessage({ type: 'ready' });
    </script>
</body>
</html>
